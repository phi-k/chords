name: chords
description: "Your ultimate open-source chords and tabs manager."
publish_to: 'none'

version: 1.1.5+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  html: ^0.15.5
  http: ^1.3.0
  font_awesome_flutter: ^10.8.0
  google_fonts: ^6.2.1
  pdf: ^3.11.3
  printing: ^5.14.2
  permission_handler: ^12.0.1
  flutter_file_dialog: ^3.0.2
  path_provider: ^2.1.5
  dio: ^5.8.0+1
  file_picker: ^10.0.0
  intl: ^0.20.2
  fl_chart: ^1.1.1
  uuid: ^4.5.1
  flutter_riverpod: ^2.6.1
  flutter_launcher_icons: ^0.14.4
  package_info_plus: ^9.0.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  open_filex: ^4.7.0
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_audio_capture: ^1.1.12
  pitch_detector_dart: ^0.0.7
  audioplayers: ^6.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/sounds/click_high.wav
    - assets/sounds/click_low.wav
  fonts:
    - family: Cormorant
      fonts:
        - asset: assets/fonts/Cormorant-Regular.ttf
    - family: Ysabeau
      fonts:
        - asset: assets/fonts/Ysabeau-VariableFont_wght.ttf
          weight: 200
          style: italic
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Variable.ttf
    - family: UbuntuMono
      fonts:
        - asset: assets/fonts/UbuntuMono-Regular.ttf
        - asset: assets/fonts/UbuntuMono-Bold.ttf
    - family: LibertinusSerif
      fonts:
        - asset: assets/fonts/LibertinusSerif-Regular.ttf
